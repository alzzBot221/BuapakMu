 <!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricelist Bot & Premium</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #fff;
    }
    header {
      text-align: center;
      padding: 30px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
    }
    header h1 {
      margin: 0;
      font-size: 2.2em;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }
    .card h2 {
      margin-bottom: 10px;
    }
    .price {
      font-size: 1.8em;
      margin: 10px 0;
      color: #38bdf8;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    ul li {
      margin: 8px 0;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #1d4ed8;
    }
    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.9em;
      color: #94a3b8;
    }
  </style>
</head>
<body><header>
  <h1>PRICELIST SEWA BOT CERYDRA</h1>
  <p>lebih hemat • lebih worth it</p>
</header><div class="container">
  <div class="card">
    <h2>Sewa Bot Permanem</h2>
    <p class="price">Rp 20.000</p>
    <ul>
    <button onclick="orderWhatsApp('Sewa Bot 3 Bulan','Rp 5.000')">Beli Sekarang</button>
  </div>  <div class="card">
    <h2>Sewa Bot 3 Bulan</h2>
    <p class="price">Rp 5.000</p>
    <ul>
      <li>✔ IDEAL</li>
    </ul>
    <button onclick="orderWhatsApp('Sewa Bot 5 Bulan','Rp 10.000')">Beli Sekarang</button>
  </div>  <div class="card">
    <h2>Sewa Bot 5 Bulan</h2>
    <p class="price">Rp 10.000</p>
    </ul>
    <button onclick="orderWhatsApp('Premium User','Rp 20.000')">Beli Sekarang</button>
  </div>  <div class="card">
    <h2>Premium User</h2>
    <p class="price">Rp 20.000</p>
    <ul>
    <button onclick="orderWhatsApp('Premium User','Rp 20.000')">Upgrade</button>
  </div>
</div><footer>
  © 2026 Zyroo Store - All Rights Reserved
</footer><script>
  function orderWhatsApp(paket, harga) {
    const nomor = '6285852137076'; // GANTI dengan nomor WhatsApp kamu
    const pesan = `Halo kak, saya mau order ${paket} dengan harga ${harga}`;
    const url = `https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;
    window.open(url, '_blank');
  }
</script></body>
</html>
